name: Rust
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
env:
  CARGO_TERM_COLOR: always
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install LLVM and Clang
      uses: KyleMayes/install-llvm-action@v2.0.8
      with:
        version: "18.1"

    - name: Set LLVM environment variables
      run: |
        which llvm-config || (echo "llvm-config not found on PATH!" && exit 1)
        LLVM_PREFIX=$(llvm-config --prefix)
        echo "LLVM_SYS_181_PREFIX=$LLVM_PREFIX" >> $GITHUB_ENV
        echo "LIBCLANG_PATH=$LLVM_PREFIX/lib" >> $GITHUB_ENV
            
    - name: Build
      run: cargo build --verbose

    - name: Run tests
      run: cargo test --verbose
